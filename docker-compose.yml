services:
  setup:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: money-tracker
      DB_USERNAME: root
      DB_PASSWORD: "@l8i1tUre"
    depends_on:
      - db
    command: >
      sh -c "composer install --no-interaction &&
             php artisan key:generate --force &&
             (php artisan storage:link || true) &&
             until mysqladmin ping -h\"$${DB_HOST}\" -P\"$${DB_PORT}\" -u\"$${DB_USERNAME}\" -p\"$${DB_PASSWORD}\" --silent; do sleep 2; done &&
             until php artisan migrate; do sleep 3; done &&
             php artisan optimize"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: money-tracker
      DB_USERNAME: root
      DB_PASSWORD: "@l8i1tUre"
    command: >
      sh -c "if [ ! -f vendor/autoload.php ]; then composer install --no-interaction; fi &&
             php artisan serve --host=0.0.0.0 --port=8080"
    depends_on:
      - db

  db:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: money-tracker
      MYSQL_ROOT_PASSWORD: "@l8i1tUre"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  vendor_data:
